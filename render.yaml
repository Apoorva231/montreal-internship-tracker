services:
  - type: web
    name: montreal-internship-tracker
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11.7.0 --activate && pnpm install --frozen-lockfile --prod=false && pnpm db:generate && pnpm build
    startCommand: corepack enable && corepack prepare pnpm@11.7.0 --activate && pnpm db:deploy && pnpm --filter @mit/api start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: montreal-internship-tracker-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://montreal-internship-tracker.onrender.com

databases:
  - name: montreal-internship-tracker-db
    plan: free
    databaseName: internship_tracker
    user: internship_tracker_user
