services:
  postgres:
    image: postgres:16-alpine
    container_name: montreal_internship_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internship_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internship_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

